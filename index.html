              { text: '食パンをアパレイユに浸し、電子レンジ(500W)でラップをせずに両面各30秒ずつ加熱すると、一気に液を吸い込みます。', duration: 120 },
              { text: 'フライパンにバターを弱火で溶かし、パンを入れて蓋をし、綺麗な焼き色がつくまで3〜4分じっくり蒸し焼きにします。', duration: 240 },
              { text: 'ひっくり返して裏面も同様に蓋をして2〜3分焼き、お皿に盛ってメープルシロップをお好みでかけます。', duration: 180 }

        const WEEK_DAYS = ['月', '火', '水', '木', '金', '土', '日'];
        const MEAL_TYPES = ['朝食', '昼食', '夕食'];

        function App() {
          const [recipes, setRecipes] = useState(() => {
            const saved = localStorage.getItem('delish_recipes');
            return saved ? JSON.parse(saved) : INITIAL_RECIPES;
          });
          
          const [activeTab, setActiveTab] = useState('explore'); // 'explore' | 'favorites' | 'planner' | 'shopping' | 'create'
          const [searchQuery, setSearchQuery] = useState('');
          const [selectedCategory, setSelectedCategory] = useState('すべて');
          const [selectedRecipe, setSelectedRecipe] = useState(null);
          
          // レシピ詳細関連のステート
          const [scaleServings, setScaleServings] = useState(2);
          const [activeStepIndex, setActiveStepIndex] = useState(0);
          const [completedSteps, setCompletedSteps] = useState({});
          
          // タイマー関連ステート
          const [timerDuration, setTimerDuration] = useState(0); // in seconds
          const [timerRemaining, setTimerRemaining] = useState(0);
          const [isTimerRunning, setIsTimerRunning] = useState(false);
          const timerRef = useRef(null);
          const audioContextRef = useRef(null);

          // 1週間の献立プラン
          const [mealPlan, setMealPlan] = useState(() => {
            const saved = localStorage.getItem('delish_meal_plan');
            return saved ? JSON.parse(saved) : {
              '月': { '朝食': null, '昼食': null, '夕食': 'rec-1' },
              '火': { '朝食': null, '昼食': null, '夕食': null },
              '水': { '朝食': null, '昼食': null, '夕食': 'rec-3' },
              '木': { '朝食': null, '昼食': null, '夕食': null },
              '金': { '朝食': null, '昼食': null, '夕食': 'rec-2' },
              '土': { '朝食': null, '昼食': null, '夕食': null },
              '日': { '朝食': null, '昼食': null, '夕食': 'rec-4' },
            };
          });

          // 買い物リスト
          const [shoppingList, setShoppingList] = useState(() => {
            const saved = localStorage.getItem('delish_shopping_list');
            return saved ? JSON.parse(saved) : [
              { id: 'shop-1', name: '牛薄切り肉', amount: '150g', checked: false },
              { id: 'shop-2', name: 'じゃがいも', amount: '3個', checked: false },
              { id: 'shop-3', name: '辛子明太子', amount: '1腹', checked: true }
            ];
          });
          
          const [newShoppingItem, setNewShoppingItem] = useState({ name: '', amount: '' });

          // レシピ新規作成フォームのステート
          const [newRecipe, setNewRecipe] = useState({
            title: '',
            category: '和食',
            description: '',
            prepTime: 15,
            difficulty: '簡単',
            calories: 300,
            servings: 2,
            image: '',
            ingredients: [{ name: '', amount: '', unit: 'g' }],
            steps: [{ text: '', duration: 120 }]
          });

          // 通知（Toast）メッセージ
          const [toastMessage, setToastMessage] = useState('');

          // 各種永続化
          useEffect(() => {
            localStorage.setItem('delish_recipes', JSON.stringify(recipes));
          }, [recipes]);

          useEffect(() => {
            localStorage.setItem('delish_meal_plan', JSON.stringify(mealPlan));
          }, [mealPlan]);

          useEffect(() => {
            localStorage.setItem('delish_shopping_list', JSON.stringify(shoppingList));
          }, [shoppingList]);

          const showToast = (message) => {
            setToastMessage(message);
            setTimeout(() => {
              setToastMessage('');
            }, 3000);
          };

          // リアルなアラーム通知音（Web Audio API）
          const playBeep = () => {
            try {
              if (!audioContextRef.current) {
                audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
              }
              const ctx = audioContextRef.current;
              if (ctx.state === 'suspended') {
                ctx.resume();
              }
              
              const playTone = (time, freq, dur) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(freq, time);
                gain.gain.setValueAtTime(0.3, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + dur - 0.05);
                osc.start(time);
                osc.stop(time + dur);
              };

              const now = ctx.currentTime;
              playTone(now, 880, 0.15);
              playTone(now + 0.2, 880, 0.15);
              playTone(now + 0.4, 880, 0.15);
              playTone(now + 0.8, 880, 0.15);
              playTone(now + 1.0, 880, 0.15);
              playTone(now + 1.2, 880, 0.15);
            } catch (e) {
              console.error("Audio Context Error: ", e);
            }
          };

          // タイマー作動ロジック
          useEffect(() => {
            if (isTimerRunning && timerRemaining > 0) {
              timerRef.current = setInterval(() => {
                setTimerRemaining(prev => {
                  if (prev <= 1) {
                    clearInterval(timerRef.current);
                    setIsTimerRunning(false);
                    playBeep();
                    showToast("⏰ タイマー時間になりました！");
                    return 0;
                  }
                  return prev - 1;
                });
              }, 1000);
            } else {
              clearInterval(timerRef.current);
            }

            return () => clearInterval(timerRef.current);
          }, [isTimerRunning, timerRemaining]);

          const startTimer = (duration) => {
            setTimerDuration(duration);
            setTimerRemaining(duration);
            setIsTimerRunning(true);
            showToast(`⏱️ ${Math.floor(duration / 60)}分 のタイマーを開始しました`);
          };

          const toggleTimer = () => {
            setIsTimerRunning(!isTimerRunning);
          };

          const resetTimer = () => {
            setIsTimerRunning(false);
            setTimerRemaining(0);
          };

          // 分量の自動計算スケーリング
          const getScaledAmount = (amount, originalServings, targetServings) => {
            if (typeof amount !== 'number' || isNaN(amount)) return amount;
            const value = (amount * targetServings) / originalServings;
            return Math.round(value * 100) / 100;
          };

          // お気に入りトグル
          const toggleFavorite = (recipeId, e) => {
            if (e) e.stopPropagation();

            let itemsToAdd = [];

            Object.keys(dayMeals).forEach(mealType => {
              const recId = dayMeals[mealType];
              if (recId) {
                const recipe = recipes.find(r => r.id === recId);
                if (recipe) {

                    itemsToAdd.push({
                      name: ing.name,
                      amount: `${ing.amount}${ing.unit}`

                  });
                }
              }
            });

            if (itemsToAdd.length === 0) {
              showToast(`⚠️ ${day}曜日に設定された献立がありません。`);
              return;
            }

            setShoppingList(prev => {
              const updated = [...prev];
              itemsToAdd.forEach(newItem => {
                const matchIdx = updated.findIndex(i => i.name === newItem.name && !i.checked);
                if (matchIdx > -1) {
                  updated[matchIdx].amount = `${updated[matchIdx].amount} + ${newItem.amount}`;
                } else {
                  updated.push({
                    id: `shop-${Date.now()}-${Math.random()}`,
                    name: newItem.name,
                    amount: newItem.amount,
                    checked: false
                  });
                }
              });
              return updated;

                const amountStr = typeof scaledAmt === 'number' ? `${scaledAmt}${ing.unit}` : `${ing.amount}${ing.unit}`;
                
                updated.push({
                  id: `shop-${Date.now()}-${Math.random()}`,
                  name: ing.name,
                  amount: amountStr,
                  checked: false
                });

                                type="button"
                                onClick={handleAddStepRow}
                                className="text-xs text-orange-600 hover:text-orange-700 font-bold flex items-center gap-0.5"
                              >
                                <Icons.Plus className="w-3.5 h-3.5" />
                                工程を追加
                              </button>
                            </div>

                            <div className="space-y-3">
                              {newRecipe.steps.map((step, idx) => (
                                <div key={idx} className="space-y-1.5 p-3.5 bg-slate-50/70 rounded-xl border border-slate-100 relative">
                                  <div className="flex justify-between items-center mb-1">
                                    <span className="text-xs font-bold text-slate-400">工程 {idx + 1}</span>
                                    {newRecipe.steps.length > 1 && (
                                      <button 
                                        type="button" 
                                        onClick={() => handleRemoveStepRow(idx)}
                                        className="text-slate-300 hover:text-rose-500 p-1 absolute top-2 right-2"
                                      >
                                        <Icons.Trash2 className="w-4 h-4" />
                                      </button>
                                    )}
                                  </div>
                                  
                                  <textarea 
                                    required
                                    placeholder="この工程で行う作業を記載..." 
                                    value={step.text}
                                    onChange={(e) => {
                                      const updated = [...newRecipe.steps];
                                      updated[idx].text = e.target.value;
                                      setNewRecipe(prev => ({ ...prev, steps: updated }));
                                    }}
                                    className="w-full text-xs bg-white border border-slate-200 rounded-lg p-2.5 focus:outline-hidden h-16 resize-none font-medium text-slate-700"
                                  />

                                  <div className="flex items-center gap-2">
                                    <span className="text-[10px] font-bold text-slate-400">この工程の推奨タイマー (秒):</span>
                                    <input 
                                      type="number" 
                                      placeholder="例: 120" 
                                      value={step.duration}
                                      onChange={(e) => {
                                        const updated = [...newRecipe.steps];
                                        updated[idx].duration = e.target.value;
                                        setNewRecipe(prev => ({ ...prev, steps: updated }));
                                      }}
                                      className="w-24 text-xs bg-white border border-slate-200 rounded-md px-2 py-1 focus:outline-hidden font-bold"
                                    />
                                    <span className="text-[10px] text-slate-400 font-bold">秒</span>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>

                          <button 
                            type="submit"
                            className="w-full bg-orange-500 hover:bg-orange-600 text-white font-extrabold py-3.5 rounded-2xl shadow-md shadow-orange-500/10 transition-all flex items-center justify-center gap-2"
                          >
                            <Icons.Edit3 className="w-5 h-5" />
                            このオリジナルレシピを保存
                          </button>
                        </form>
                      </div>
                    )}
                  </>
                )}
              </main>

              {/* スマートフォンライクなボトムタブナビゲーション */}
              <nav className="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-amber-100 shadow-xl z-40">
                <div className="max-w-4xl mx-auto px-4 py-2 flex justify-around items-center">
                  <button 
                    onClick={() => { setSelectedRecipe(null); setActiveTab('explore'); }}
                    className={`flex flex-col items-center gap-1 p-2 transition-all ${
                      activeTab === 'explore' && !selectedRecipe ? 'text-orange-500 scale-105' : 'text-slate-400 hover:text-slate-600'
                    }`}
                  >
                    <Icons.BookOpen className="w-5.5 h-5.5" />
                    <span className="text-[9px] font-extrabold tracking-wider">探す</span>
                  </button>

                  <button 
                    onClick={() => { setSelectedRecipe(null); setActiveTab('favorites'); }}
                    className={`flex flex-col items-center gap-1 p-2 transition-all ${
                      activeTab === 'favorites' ? 'text-orange-500 scale-105' : 'text-slate-400 hover:text-slate-600'
                    }`}
                  >
                    <Icons.Heart className="w-5.5 h-5.5" />
                    <span className="text-[9px] font-extrabold tracking-wider">お気に入り</span>
                  </button>

                  <button 
                    onClick={() => { setSelectedRecipe(null); setActiveTab('planner'); }}
                    className={`flex flex-col items-center gap-1 p-2 transition-all ${
                      activeTab === 'planner' ? 'text-orange-500 scale-105' : 'text-slate-400 hover:text-slate-600'
                    }`}
                  >
                    <Icons.Calendar className="w-5.5 h-5.5" />
                    <span className="text-[9px] font-extrabold tracking-wider">献立プラン</span>
                  </button>

                  <button 
                    onClick={() => { setSelectedRecipe(null); setActiveTab('shopping'); }}
                    className={`flex flex-col items-center gap-1 p-2 transition-all ${
                      activeTab === 'shopping' ? 'text-orange-500 scale-105' : 'text-slate-400 hover:text-slate-600'
                    }`}
                  >
                    <Icons.ShoppingBag className="w-5.5 h-5.5" />
                    <span className="text-[9px] font-extrabold tracking-wider">買い物リスト</span>
                  </button>

                  <button 
                    onClick={() => { setSelectedRecipe(null); setActiveTab('create'); }}
                    className={`flex flex-col items-center gap-1 p-2 transition-all ${
                      activeTab === 'create' ? 'text-orange-500 scale-105' : 'text-slate-400 hover:text-slate-600'
                    }`}
                  >
                    <Icons.Plus className="w-5.5 h-5.5 bg-orange-100 text-orange-600 rounded-lg p-0.5" />
                    <span className="text-[9px] font-extrabold tracking-wider">マイレシピ</span>
                  </button>
                </div>
              </nav>
            </div>
          );
        }

        // React アプリケーションのレンダリング
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
